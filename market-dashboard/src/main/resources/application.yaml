# ── Spring Boot Actuator ──────────────────────────────────────────────────────
# FIX 1: added 'prometheus' and 'loggers' to exposure list
#         without 'prometheus' here, /actuator/prometheus returns 404 regardless
#         of SecurityConfig — Spring Boot simply doesn't mount the endpoint
# FIX 2: show-details: always so admin dashboard health tab can read
#         component statuses (mongo UP/DOWN, redis UP/DOWN, kafka UP/DOWN)
# FIX 3: moved export.prometheus under metrics (correct Spring Boot 3.x path)
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus,loggers,env

  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true

  metrics:
    tags:
      application: market-dashboard
    export:
      prometheus:
        enabled: true
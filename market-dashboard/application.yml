spring:
  application:
    name: market-dashboard

  task:
    scheduling:
      enabled: true

  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: false

    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:market-group}
      auto-offset-reset: earliest
    producer:
      acks: all
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-256
      sasl.jaas.config: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"${KAFKA_SASL_USERNAME:avnadmin}\" password=\"${KAFKA_SASL_PASSWORD:}\";
"
      ssl.endpoint.identification.algorithm: ""

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    tls: true
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
  consumer:
    group-id: ${KAFKA_CONSUMER_GROUP:market-group}
    auto-offset-reset: earliest
  producer:
    acks: all
  topics:
    crypto-prices: crypto-prices-topic
    stock-prices: stock-prices-topic
    ai-analysis: ai-analysis-topic
    anomaly-alerts: anomaly-alerts-topic

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

server:
  port: ${PORT:8080}

gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemma-3-27b-it
  base-url: https://generativelanguage.googleapis.com/v1beta/models
  daily-limit: 200

stock:
  fetch:
    enabled: true
  rest:
    enabled: false
  websocket:
    enabled: true

cache:
  ttl:
    latest-price: 5
    history: 60

prediction:
  cache:
    ttl-hours: 1
  schedule:
    enabled: true

logging:
  level:
    root: INFO
    org.springframework.kafka: WARN
    org.springframework.data.mongodb: WARN
    org.springframework.security: WARN
    com.marketai.dashboard: INFO

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus,loggers,env
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: market-dashboard
    export:
      prometheus:
        enabled: true

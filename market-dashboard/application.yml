
spring:
  application:
    name: market-dashboard

  task:
    scheduling:
      enabled: true

  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: false

    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:true}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:market-group}
      auto-offset-reset: earliest
    producer:
      acks: all
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS:}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    tls: true
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
  consumer:
    group-id: ${KAFKA_CONSUMER_GROUP:market-group}
    auto-offset-reset: earliest
  producer:
    acks: all
  topics:
    cryptoPrices: crypto-prices-topic
    stockPrices: stock-prices-topic
    aiAnalysis: ai-analysis-topic
    anomalyAlerts: anomaly-alerts-topic
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

server:
  port: ${PORT:8080}

gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemma-3-27b-it
  base-url: https://generativelanguage.googleapis.com/v1beta/models
  daily-limit: 200

stock:
  fetch:
    enabled: true
  rest:
    enabled: false
  websocket:
    enabled: true

cache:
  ttl:
    latest-price: 5
    history: 60

prediction:
  cache:
    ttl-hours: 1
  schedule:
    enabled: true

logging:
  level:
    root: INFO
    org.springframework.kafka: WARN
    org.springframework.data.mongodb: WARN
    org.springframework.security: WARN
    com.marketai.dashboard: INFO

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus,loggers,env
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: market-dashboard
    export:
      prometheus:
        enabled: true
